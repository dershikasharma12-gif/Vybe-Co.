<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vybe Co. — Studio (Owner)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --bg: #FBFAF7; --bg-soft: #F4F1EC; --panel: #FFFFFF;
    --ink: #1A1A1A; --ink-soft: #4A4845; --muted: #9C9892;
    --line: #E8E4DE; --accent: #B8A998;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --script: 'Allura', cursive;
    --ease: cubic-bezier(.2,.6,.2,1);
    --good: #4a7a4e; --warn: #8a4a2e; --bad: #b04444;
  }
  html, body { background: var(--bg-soft); color: var(--ink); font-family: var(--sans); font-weight: 300; line-height: 1.55; -webkit-font-smoothing: antialiased; min-height: 100vh; }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; font-size: 14px; color: var(--ink); }
  h1, h2, h3, h4 { font-family: var(--serif); font-weight: 400; letter-spacing: -.01em; line-height: 1.1; }
  ::selection { background: var(--ink); color: var(--bg); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-soft); }
  ::-webkit-scrollbar-thumb { background: var(--line); }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .brand-mark { display: inline-flex; align-items: flex-end; gap: 4px; color: var(--ink); text-decoration: none; line-height: 1; }
  .brand-mark .vy { font-family: 'Allura', cursive; font-size: 46px; line-height: .8; letter-spacing: -.01em; }
  .brand-mark .co { font-family: 'Cormorant Garamond', serif; font-size: 12px; letter-spacing: .08em; color: var(--ink-soft); margin-bottom: 9px; margin-left: 2px; }
  .brand-mark.invert { color: var(--bg); }
  .brand-mark.invert .co { color: rgba(251,250,247,.65); }
  .brand-mark.xl .vy { font-size: 112px; }
  .brand-mark.xl .co { font-size: 24px; margin-bottom: 22px; margin-left: 4px; }

  .login-screen { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; background: var(--bg); }
  .login-art { background: linear-gradient(135deg, #F4F1EC 0%, #E0D5C5 100%); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 64px; }
  .login-art::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle at 20% 30%, rgba(184,169,152,.3), transparent 40%), radial-gradient(circle at 80% 70%, rgba(184,169,152,.2), transparent 50%); }
  .login-art-content { position: relative; z-index: 1; text-align: center; }
  .login-art .eyebrow { font-size: 11px; letter-spacing: .28em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 24px; }
  .login-art h2 { font-family: var(--serif); font-style: italic; font-size: 36px; max-width: 420px; color: var(--ink); line-height: 1.3; margin-top: 40px; }
  .login-form-wrap { display: flex; align-items: center; justify-content: center; padding: 64px; }
  .login-card { width: 100%; max-width: 380px; }
  .login-card h1 { font-size: 40px; margin-bottom: 8px; }
  .login-card p { color: var(--ink-soft); margin-bottom: 36px; font-size: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
  .field label { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-soft); }
  .field input, .field textarea, .field select { padding: 13px 14px; border: 1px solid var(--line); background: var(--panel); font-size: 14px; transition: border-color .2s; outline: none; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--ink); }
  .field textarea { resize: vertical; min-height: 100px; font-family: inherit; line-height: 1.5; }
  .field .hint { font-size: 11px; color: var(--muted); }
  .field.full { grid-column: span 2; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 720px) { .form-grid { grid-template-columns: 1fr; } .field.full { grid-column: span 1; } }
  @media (max-width: 900px) { .login-screen { grid-template-columns: 1fr; } .login-art { display: none; } }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 28px; font-size: 11px; letter-spacing: .22em; text-transform: uppercase; font-weight: 500; transition: all .25s var(--ease); cursor: pointer; border: 1px solid transparent; white-space: nowrap; }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:hover { background: var(--ink-soft); }
  .btn-outline { border-color: var(--line); color: var(--ink); background: var(--panel); }
  .btn-outline:hover { border-color: var(--ink); }
  .btn-sm { padding: 10px 16px; font-size: 10px; letter-spacing: .18em; }
  .btn-danger { color: var(--bad); border: 1px solid #e8c4c4; background: var(--panel); }
  .btn-danger:hover { background: var(--bad); color: #fff; border-color: var(--bad); }

  .app { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: 64px 1fr; grid-template-areas: "side topbar" "side main"; min-height: 100vh; }
  .topbar { grid-area: topbar; background: var(--panel); border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 30; }
  .topbar-left { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-soft); }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .topbar-right .live-status { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-soft); padding-right: 16px; border-right: 1px solid var(--line); }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

  .sidebar { grid-area: side; background: var(--ink); color: var(--bg); padding: 24px 0; display: flex; flex-direction: column; gap: 2px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .sidebar-brand { padding: 0 24px 24px; border-bottom: 1px solid rgba(255,255,255,.08); margin-bottom: 20px; }
  .sidebar-section-label { padding: 16px 24px 8px; font-size: 10px; letter-spacing: .24em; text-transform: uppercase; color: rgba(251,250,247,.4); }
  .nav-item { padding: 12px 24px; font-size: 12px; letter-spacing: .14em; text-transform: uppercase; cursor: pointer; color: rgba(251,250,247,.62); transition: all .2s var(--ease); border-left: 2px solid transparent; display: flex; align-items: center; gap: 12px; }
  .nav-item:hover { color: var(--bg); background: rgba(255,255,255,.03); }
  .nav-item.active { color: var(--bg); border-left-color: var(--accent); background: rgba(255,255,255,.05); }
  .nav-item svg { flex-shrink: 0; opacity: .7; }
  .nav-item.active svg { opacity: 1; }
  .sidebar-foot { margin-top: auto; padding: 16px 0; border-top: 1px solid rgba(255,255,255,.08); }

  .main { grid-area: main; padding: 48px; overflow-x: auto; background: var(--bg-soft); }
  @media (max-width: 1024px) {
    .app { grid-template-columns: 72px 1fr; }
    .nav-item span.label { display: none; }
    .nav-item { justify-content: center; padding: 16px 0; }
    .sidebar-brand { padding: 0 12px 16px; text-align: center; }
    .sidebar-brand .brand-mark .vy { font-size: 32px; }
    .sidebar-brand .brand-mark .co { font-size: 9px; margin-bottom: 6px; }
    .sidebar-section-label { display: none; }
    .main { padding: 32px 24px; }
  }
  @media (max-width: 640px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; grid-template-areas: "topbar" "side" "main"; }
    .sidebar { position: static; height: auto; flex-direction: row; overflow-x: auto; padding: 12px; gap: 0; }
    .sidebar-brand, .sidebar-section-label, .sidebar-foot { display: none; }
    .nav-item { white-space: nowrap; }
  }

  .page-head { display: flex; justify-content: space-between; align-items: end; margin-bottom: 32px; gap: 24px; flex-wrap: wrap; }
  .page-head h1 { font-size: clamp(32px, 4vw, 48px); }
  .page-head .eyebrow { font-size: 11px; letter-spacing: .24em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; display: block; }
  .page-head-actions { display: flex; gap: 12px; flex-wrap: wrap; }

  .card { background: var(--panel); border: 1px solid var(--line); padding: 28px; margin-bottom: 16px; }
  .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
  .card-head h3 { font-size: 22px; }
  .card-head .small { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .stat { background: var(--panel); border: 1px solid var(--line); padding: 24px; transition: transform .25s var(--ease), box-shadow .25s var(--ease); }
  .stat:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.04); }
  .stat .lbl { font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .stat .num { font-family: var(--serif); font-size: 42px; line-height: 1; }
  .stat .delta { font-size: 12px; color: var(--ink-soft); margin-top: 8px; }
  .stat.warn .num { color: var(--warn); }
  .stat.bad .num { color: var(--bad); }

  table.tbl { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--line); }
  table.tbl th, table.tbl td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--line); font-size: 13px; vertical-align: middle; }
  table.tbl th { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); font-weight: 500; background: var(--bg-soft); }
  table.tbl tr:last-child td { border-bottom: none; }
  table.tbl tbody tr:hover { background: var(--bg-soft); }
  table.tbl .thumb { width: 48px; height: 60px; object-fit: cover; background: var(--bg-soft); }
  .row-actions { display: flex; gap: 6px; }
  .row-actions button { padding: 6px 10px; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; border: 1px solid var(--line); background: var(--panel); transition: all .2s; }
  .row-actions button:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .row-actions button.del:hover { background: var(--bad); border-color: var(--bad); color: #fff; }
  .stock-edit { width: 70px; padding: 6px 10px; border: 1px solid var(--line); text-align: center; background: var(--panel); font-size: 13px; }
  .stock-edit:focus { outline: none; border-color: var(--ink); }
  .pill { display: inline-block; font-size: 9px; letter-spacing: .18em; text-transform: uppercase; padding: 3px 8px; border: 1px solid var(--line); color: var(--ink-soft); }
  .pill.warn { color: var(--warn); border-color: #ddc8b8; background: #faf3eb; }
  .pill.bad { color: var(--bad); border-color: #e8c4c4; background: #fbf0f0; }
  .pill.good { color: var(--good); border-color: #c8d8c8; background: #f0f5f0; }
  .pill.featured { color: var(--accent); border-color: var(--accent); }

  .empty { text-align: center; padding: 80px 24px; color: var(--muted); background: var(--panel); border: 1px dashed var(--line); }
  .empty .script { font-family: var(--script); font-size: 64px; color: var(--accent); line-height: 1; margin-bottom: 16px; }

  .modal { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
  .modal.open { display: flex; animation: fadeIn .25s var(--ease); }
  .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.5); }
  .modal-content { position: relative; background: var(--panel); max-width: 720px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 40px; border: 1px solid var(--line); }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
  .modal-head h2 { font-size: 28px; }
  .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--line); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .icon-btn { width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; transition: opacity .2s; }
  .icon-btn:hover { opacity: .65; }

  .toast { position: fixed; bottom: 32px; right: 32px; background: var(--ink); color: var(--bg); padding: 14px 24px; font-size: 12px; letter-spacing: .18em; text-transform: uppercase; opacity: 0; pointer-events: none; transform: translateY(20px); transition: all .3s var(--ease); z-index: 300; }
  .toast.show { opacity: 1; transform: translateY(0); }

  .featured-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .featured-tile { cursor: pointer; transition: transform .2s; }
  .featured-tile:hover { transform: translateY(-2px); }
  .featured-tile-img { position: relative; aspect-ratio: 3/4; overflow: hidden; background: var(--bg-soft); border: 2px solid transparent; transition: border-color .2s; }
  .featured-tile.on .featured-tile-img { border-color: var(--ink); }
  .featured-tile.on .featured-tile-img::after { content: '★'; position: absolute; top: 8px; right: 10px; color: var(--accent); font-size: 16px; }
  .featured-tile img { width: 100%; height: 100%; object-fit: cover; }
  .featured-tile:not(.on) img { opacity: .45; }
  .featured-tile .nm { font-size: 11px; margin-top: 6px; font-family: var(--serif); color: var(--ink-soft); }

  .looks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
  .look-card { background: var(--panel); border: 1px solid var(--line); overflow: hidden; }
  .look-collage { aspect-ratio: 1; background: linear-gradient(135deg, #F4F1EC 0%, #E8E0D4 100%); position: relative; display: flex; flex-wrap: wrap; padding: 14px; gap: 8px; align-content: flex-start; }
  .look-collage img { width: calc(50% - 4px); aspect-ratio: 3/4; object-fit: cover; background: var(--panel); }
  .look-card .body { padding: 16px; }
  .look-card .body .nm { font-family: var(--serif); font-size: 18px; margin-bottom: 4px; }
  .look-card .body .meta { font-size: 11px; color: var(--muted); margin-bottom: 12px; }

  .small { font-size: 12px; } .muted { color: var(--muted); } .hidden { display: none !important; }
  .img-upload { display: grid; grid-template-columns: 80px 1fr; gap: 12px; align-items: start; padding: 8px; border: 1px dashed var(--line); background: var(--bg-soft); border-radius: 2px; transition: all .2s; }
  .img-upload.drag-over { border-color: var(--ink); background: var(--panel); }
  .img-upload-preview { width: 80px; height: 80px; background: var(--panel); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .img-upload-preview img { width: 100%; height: 100%; object-fit: cover; }
  .img-upload-preview .ph { font-size: 10px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
  .img-upload-right { display: flex; flex-direction: column; gap: 6px; }
  .img-upload-right input { padding: 9px 12px; border: 1px solid var(--line); font-size: 13px; background: var(--panel); }
  .img-upload-right input:focus { outline: none; border-color: var(--ink); }
  .img-upload-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .img-upload-btns button { padding: 6px 12px; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; border: 1px solid var(--line); background: var(--panel); transition: all .2s; }
  .img-upload-btns button:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .img-upload-multi { padding: 12px; border: 1px dashed var(--line); background: var(--bg-soft); border-radius: 2px; }
  .img-upload-multi.drag-over { border-color: var(--ink); background: var(--panel); }
  .img-thumbs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .img-thumbs .t { position: relative; width: 64px; height: 80px; }
  .img-thumbs .t img { width: 100%; height: 100%; object-fit: cover; border: 1px solid var(--line); }
  .img-thumbs .t .rm { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: var(--ink); color: var(--bg); font-size: 14px; line-height: 18px; cursor: pointer; border: none; }
</style>
</head>

<div id="loginRoot"></div>
<div id="appRoot" class="hidden"></div>
<div class="modal" id="modal"><div class="modal-overlay" onclick="closeModal()"></div><div class="modal-content" id="modalContent"></div></div>
<div class="toast" id="toast"></div>
<script>
const LS_KEY = 'vybe_co_data_v1';
const CUSTOMER_SITE = 'https://vybe-co-five.vercel.app/';

/* ============================================================
   CLOUD SYNC — JSONBin.io (cross-device live sync)
   Setup: see DEPLOY.md.  Leave blank to disable.
============================================================ */
const JSONBIN_BIN_ID  = '6a0c0e836877513b27970879';
const JSONBIN_API_KEY = '$2a$10$R8LhhuVp/QKKBocwTCya5uoG5f/VmSJjgTZkoP70L2879aKlJbTZ6';
const CLOUD_KEYS = ['config', 'products', 'categories', 'articles', 'coupons'];
const CLOUD_ON   = () => !!(JSONBIN_BIN_ID && JSONBIN_API_KEY);
function cloudSubset(d){ const o={}; for(const k of CLOUD_KEYS) if(d[k]!==undefined) o[k]=d[k]; return o; }
async function cloudFetch(){
  if(!JSONBIN_BIN_ID) return null;
  try{
    const h = JSONBIN_API_KEY ? {'X-Master-Key':JSONBIN_API_KEY} : {};
    const r = await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_BIN_ID+'/latest', { headers: h });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json(); return j.record || null;
  }catch(e){ console.warn('[cloud] fetch failed:', e); return null; }
}
let _pushT = null;
function cloudPush(d){
  if(!CLOUD_ON()) return;
  clearTimeout(_pushT);
  _pushT = setTimeout(async () => {
    const dot = document.getElementById('cloudDot');
    try{
      const r = await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_BIN_ID, {
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_API_KEY},
        body: JSON.stringify(cloudSubset(d))
      });
      if(!r.ok) throw new Error('HTTP '+r.status);
      if(dot){ dot.style.background='var(--good)'; dot.title='Cloud synced '+new Date().toLocaleTimeString(); }
    }catch(e){
      console.warn('[cloud] push failed:', e);
      if(dot){ dot.style.background='var(--bad)'; dot.title='Push failed: '+e.message; }
    }
  }, 700);
}


const SEED = {
  config: {
    siteName: 'Vybe Co.',
    tagline: 'Curated pieces. Endless vybes.',
    heroEyebrow: 'Spring / Summer 2026',
    heroHeading: 'Pieces that\nstart conversations.',
    heroLead: 'A considered wardrobe of versatile, timeless silhouettes — designed in small batches and made to be styled, restyled, and lived in.',
    heroImage: 'https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1200&q=80&auto=format&fit=crop',
    heroCaption: 'The Linen Edit — May 2026',
    aboutTitle: 'A boutique\nbuilt on instinct.',
    aboutText: 'Vybe Co. began as a small studio in 2023, born from a love of fabric, form, and the women who wear clothes like they mean it.',
    aboutImage: 'https://images.unsplash.com/photo-1558769132-cb1aea458c5e?w=900&q=80&auto=format&fit=crop',
    marqueeText: 'Free shipping over $150 · Studio-curated · Designed in small batches · Made to last',
    footerTagline: 'Curated pieces, made to be styled and restyled.',
    instagram: '@vybe.co',
    email: 'hello@vybeco.studio',
    logoMain: 'Vybe',
    logoSub: 'Co.',
    logoEmojiBefore: '',
    logoEmojiAfter: '',
    baseCurrency: 'USD',
    currencies: [
      { code: 'USD', symbol: '$',   rate: 1 },
      { code: 'INR', symbol: '₹',   rate: 83 },
      { code: 'EUR', symbol: '€',   rate: 0.92 },
      { code: 'GBP', symbol: '£',   rate: 0.79 },
      { code: 'AED', symbol: 'AED ', rate: 3.67 },
      { code: 'CAD', symbol: 'C$',  rate: 1.36 },
    ],
  },
  adminPassword: 'vybe2026',
  categories: [], products: [], articles: [], cart: [], savedLooks: [],
};

function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) { localStorage.setItem(LS_KEY, JSON.stringify(SEED)); return JSON.parse(JSON.stringify(SEED)); }
    return JSON.parse(raw);
  } catch (e) { return JSON.parse(JSON.stringify(SEED)); }
}
function saveData(d) { localStorage.setItem(LS_KEY, JSON.stringify(d)); cloudPush(d); }
function uid(prefix) { return (prefix||'id') + '-' + Math.random().toString(36).slice(2,9); }
function fmt(n) {
  const list = (DATA.config.currencies && DATA.config.currencies.length) ? DATA.config.currencies : [{code:'USD',symbol:'$',rate:1}];
  const base = DATA.config.baseCurrency || 'USD';
  const cur = list.find(c => c.code === base) || list[0];
  return cur.symbol + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let DATA = loadData();

/* ===== Image upload helpers (drag-and-drop + click to upload) ===== */
const MAX_IMG_BYTES = 800 * 1024; // 800 KB soft warning
function readFileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
async function pickAndSetImage(inputId, previewId) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = async e => {
    const f = e.target.files[0]; if (!f) return;
    if (f.size > MAX_IMG_BYTES && !confirm('This image is ' + Math.round(f.size/1024) + ' KB. Larger images bloat your cloud storage. Continue?')) return;
    const url = await readFileToDataURL(f);
    document.getElementById(inputId).value = url;
    setImgPreview(previewId, url);
  };
  inp.click();
}
function setImgPreview(previewId, url) {
  const el = document.getElementById(previewId);
  if (!el) return;
  el.innerHTML = url ? `<img src="${url}" alt="preview" />` : '<span class="ph">No image</span>';
}
function wireImageDrop(zoneId, inputId, previewId) {
  const zone = document.getElementById(zoneId);
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', async e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0]; if (!f || !f.type.startsWith('image/')) return;
    if (f.size > MAX_IMG_BYTES && !confirm('This image is ' + Math.round(f.size/1024) + ' KB. Continue?')) return;
    const url = await readFileToDataURL(f);
    document.getElementById(inputId).value = url;
    setImgPreview(previewId, url);
  });
}
function clearImage(inputId, previewId) {
  document.getElementById(inputId).value = '';
  setImgPreview(previewId, '');
}
function imgUploadHTML(inputId, value, label, placeholder) {
  const zoneId = 'zone-' + inputId;
  const previewId = 'prev-' + inputId;
  return `
    <div class="field full">
      <label>${label}</label>
      <div class="img-upload" id="${zoneId}">
        <div class="img-upload-preview" id="${previewId}">${value ? `<img src="${esc(value)}" />` : '<span class="ph">No image</span>'}</div>
        <div class="img-upload-right">

          <div class="img-upload-btns">
            <button type="button" onclick="pickAndSetImage('${inputId}','${previewId}')">⬆ Upload</button>
            <button type="button" onclick="clearImage('${inputId}','${previewId}')">Clear</button>

        </div>

  `;
}
/* For multiple images: list with thumbnails + add via drag/upload */
function imgMultiHTML(arrayInputId, images, label) {
  const zoneId = 'mzone-' + arrayInputId;
  const thumbsId = 'mthumbs-' + arrayInputId;
  return `
    <div class="field full">
      <label>${label}</label>
      <textarea id="${arrayInputId}" rows="2" placeholder="https://... (one per line) — or drag images onto the box below" style="font-family:inherit;padding:10px 14px;border:1px solid var(--line);background:var(--panel);">${esc((images||[]).join('\n'))}</textarea>
      <div class="img-upload-multi" id="${zoneId}" style="margin-top:8px;">
        <div class="img-upload-btns" style="justify-content:flex-start;">
          <button type="button" onclick="pickAndAddImages('${arrayInputId}','${thumbsId}')">⬆ Upload Images</button>
          <span class="hint" style="align-self:center;">drag multiple files onto this box to add them</span>
        </div>
        <div class="img-thumbs" id="${thumbsId}">${(images||[]).map((src,i)=>`<div class="t"><img src="${esc(src)}" /><button class="rm" type="button" onclick="removeMultiImage('${arrayInputId}','${thumbsId}',${i})">×</button></div>`).join('')}</div>
      </div>
    </div>
    <script>setTimeout(() => wireMultiDrop('${zoneId}','${arrayInputId}','${thumbsId}'), 0);<\/script>
  `;
}
async function pickAndAddImages(arrayInputId, thumbsId) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.multiple = true;
  inp.onchange = async e => {
    for (const f of e.target.files) {
      if (f.size > MAX_IMG_BYTES && !confirm(f.name + ' is ' + Math.round(f.size/1024) + ' KB. Skip?')) continue;
      const url = await readFileToDataURL(f);
      addToMulti(arrayInputId, thumbsId, url);
    }
  };
  inp.click();
}
function wireMultiDrop(zoneId, arrayInputId, thumbsId) {
  const zone = document.getElementById(zoneId);
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', async e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    for (const f of e.dataTransfer.files) {
      if (!f.type.startsWith('image/')) continue;
      if (f.size > MAX_IMG_BYTES && !confirm(f.name + ' is ' + Math.round(f.size/1024) + ' KB. Skip?')) continue;
      const url = await readFileToDataURL(f);
      addToMulti(arrayInputId, thumbsId, url);
    }
  });
}
function addToMulti(arrayInputId, thumbsId, url) {
  const ta = document.getElementById(arrayInputId);
  const list = ta.value.split('\n').map(x=>x.trim()).filter(Boolean);
  list.push(url);
  ta.value = list.join('\n');
  refreshMultiThumbs(arrayInputId, thumbsId);
}
function removeMultiImage(arrayInputId, thumbsId, index) {
  const ta = document.getElementById(arrayInputId);
  const list = ta.value.split('\n').map(x=>x.trim()).filter(Boolean);
  list.splice(index, 1);
  ta.value = list.join('\n');
  refreshMultiThumbs(arrayInputId, thumbsId);
}
function refreshMultiThumbs(arrayInputId, thumbsId) {
  const list = document.getElementById(arrayInputId).value.split('\n').map(x=>x.trim()).filter(Boolean);
  document.getElementById(thumbsId).innerHTML = list.map((src,i)=>`<div class="t"><img src="${esc(src)}" /><button class="rm" type="button" onclick="removeMultiImage('${arrayInputId}','${thumbsId}',${i})">×</button></div>`).join('');
}

function saveProduct(id, isEdit) {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Name is required'); return; }
  const obj = {
    id, name,
    categoryId: document.getElementById('f-cat').value,
    stock: Math.max(0, parseInt(document.getElementById('f-stock').value, 10) || 0),
    price: parseFloat(document.getElementById('f-price').value) || 0,
    salePrice: document.getElementById('f-sale').value ? parseFloat(document.getElementById('f-sale').value) : null,
    image: document.getElementById('f-img').value.trim() || 'https://images.unsplash.com/photo-1485518882345-15568b007407?w=800&q=80&auto=format&fit=crop',
    images: document.getElementById('f-imgs').value.split('\n').map(s=>s.trim()).filter(Boolean),
    description: document.getElementById('f-desc').value.trim(),
    tags: document.getElementById('f-tags').value.split(',').map(s=>s.trim()).filter(Boolean),
    featured: document.getElementById('f-feat').value === 'true',
  };
  if (!obj.images.length) obj.images = [obj.image];
  if (isEdit) { const i = DATA.products.findIndex(p => p.id === id); DATA.products[i] = obj; }
  else DATA.products.push(obj);
  saveData(DATA); closeModal(); toast(isEdit ? 'Piece updated' : 'Piece added'); renderTab();
}

function deleteProduct(id) {
  const p = DATA.products.find(x => x.id === id);
  if (!p) return;
  if (!confirm('Delete "' + p.name + '"? This cannot be undone.')) return;
  DATA.products = DATA.products.filter(x => x.id !== id);
  DATA.cart = DATA.cart.filter(c => c.productId !== id);
  saveData(DATA); toast('Piece deleted'); renderTab();
}

function saveCategory(id, isEdit) {
  const name = document.getElementById('c-name').value.trim();
  if (!name) { toast('Name is required'); return; }
  const slug = document.getElementById('c-slug').value.trim() || name.toLowerCase().replace(/[^a-z0-9]+/g,'-');

  else DATA.categories.push({ id, name, slug, image });
  saveData(DATA); closeModal(); toast(isEdit ? 'Category updated' : 'Category added'); renderTab();
}

function deleteCategory(id) {
  const c = DATA.categories.find(x => x.id === id);
  if (!c) return;
  const linked = DATA.products.filter(p => p.categoryId === id);
  if (linked.length) { if (!confirm('This category has ' + linked.length + ' piece' + (linked.length===1?'':'s') + ' linked. They will be reassigned. Continue?')) return; }
  else { if (!confirm('Delete category "' + c.name + '"?')) return; }
  DATA.categories = DATA.categories.filter(x => x.id !== id);
  DATA.products.forEach(p => { if (p.categoryId === id) p.categoryId = (DATA.categories[0] && DATA.categories[0].id) || ''; });
  saveData(DATA); toast('Category deleted'); renderTab();
}

    </div>
    <div class="card">
      <div class="card-head"><h3>Storefront link</h3></div>
      <p class="muted small" style="margin-bottom:16px;">Open the live customer-facing site:</p>
      <a href="${CUSTOMER_SITE}" target="_blank" class="btn btn-primary btn-sm">Open Storefront →</a>
    </div>`;
}

function saveBrand() {
  DATA.config.siteName = document.getElementById('s-name').value;
  DATA.config.tagline = document.getElementById('s-tag').value;
  DATA.config.email = document.getElementById('s-email').value;
  DATA.config.instagram = document.getElementById('s-ig').value;
  saveData(DATA); toast('Brand saved');
}
function savePassword() {
  const v = document.getElementById('s-pass').value.trim();
  if (!v) { toast('Password cannot be empty'); return; }
  DATA.adminPassword = v; saveData(DATA); toast('Password updated');
}
const LOGO_PRESETS = {
  default:    { before: '', after: '' },
  christmas:  { before: '🎄', after: '' },
  diwali:     { before: '🪔', after: '' },
  eid:        { before: '🌙', after: '' },
  pride:      { before: '🌈', after: '' },
  valentines: { before: '💕', after: '' },
  halloween:  { before: '🎃', after: '' },
  newyear:    { before: '✨', after: '' },
  summer:     { before: '☀️', after: '' },
  holi:       { before: '🎨', after: '' },
};
function applyLogoPreset(name) {
  const p = LOGO_PRESETS[name]; if (!p) return;
  document.getElementById('lg-before').value = p.before;
  document.getElementById('lg-after').value  = p.after;
}
function saveLogo() {
  DATA.config.logoMain = document.getElementById('lg-main').value.trim() || 'Vybe';
  DATA.config.logoSub  = document.getElementById('lg-sub').value.trim()  || 'Co.';
  DATA.config.logoEmojiBefore = document.getElementById('lg-before').value;
  DATA.config.logoEmojiAfter  = document.getElementById('lg-after').value;
  DATA.config.logoImage = document.getElementById('lg-image').value || '';
  saveData(DATA); toast('Logo saved'); applyAdminBranding(); renderTab();
}
function setCurrencyField(i, field, val) {
  if (!DATA.config.currencies[i]) return;
  if (field === 'rate') val = parseFloat(val) || 1;
  DATA.config.currencies[i][field] = val;
}
function addCurrency() {
  if (!DATA.config.currencies) DATA.config.currencies = [];
  DATA.config.currencies.push({ code: 'XXX', symbol: '$', rate: 1 });
  saveData(DATA); renderTab();
}
function removeCurrency(i) {
  if (!confirm('Remove this currency?')) return;
  DATA.config.currencies.splice(i, 1);
  saveData(DATA); renderTab();
}
function saveCurrencies() {
  const newBase = document.getElementById('cur-base').value;
  const baseObj = DATA.config.currencies.find(c => c.code === newBase);
  if (baseObj && (baseObj.rate || 1) !== 1) {
    const oldRate = baseObj.rate || 1;
    DATA.config.currencies.forEach(c => { c.rate = (c.rate || 1) / oldRate; });
  }
  DATA.config.baseCurrency = newBase;
  saveData(DATA); toast('Currency settings saved'); renderTab();
}
function applyAdminBranding() {
  const c = DATA.config || {};
  const main = c.logoMain || 'Vybe';
  const sub  = c.logoSub  || 'Co.';
  const before = c.logoEmojiBefore || '';
  const after  = c.logoEmojiAfter  || '';
  document.querySelectorAll('.brand-mark').forEach(el => {
    if (c.logoImage) {
      el.innerHTML = `<img src="${c.logoImage}" alt="logo" style="height:1.6em;width:auto;max-height:48px;object-fit:contain;" />`;
    } else {
      el.innerHTML = '<span class="vy">'+before+main+after+'</span><span class="co">'+sub+'</span>';
    }
  });
}
function exportData() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'vybe-co-data-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url); toast('Exported');
}
function importDataPrompt() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'application/json';
  input.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = (ev) => {
      try {
        const obj = JSON.parse(ev.target.result);
        if (!obj.config || !Array.isArray(obj.products)) throw new Error('Invalid file');
        if (!confirm('This will replace all current data. Continue?')) return;
        DATA = obj; saveData(DATA); toast('Data imported'); renderTab();
      } catch (err) { toast('Invalid JSON file'); }
    };
    r.readAsText(file);
  };
  input.click();
}
function resetData() {
  if (!confirm('Reset ALL store data to defaults? This deletes your custom products, articles, and settings.')) return;
  if (!confirm('Are you absolutely sure? This cannot be undone.')) return;
  localStorage.removeItem(LS_KEY); DATA = loadData(); saveData(DATA); toast('Reset complete'); renderTab();
}

async function init() {
  if (JSONBIN_BIN_ID) {
    const remote = await cloudFetch();
    if (remote) {
      for (const k of CLOUD_KEYS) if (remote[k] !== undefined) DATA[k] = remote[k];
      localStorage.setItem(LS_KEY, JSON.stringify(DATA));
    }
  }
  if (STATE.authed) { document.getElementById('loginRoot').classList.add('hidden'); renderApp(); }
  else { document.getElementById('appRoot').classList.add('hidden'); renderLogin(); }
}
init();
</script>
</body>
</html>
